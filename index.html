<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fresh Strategy — Modular solutions, delivering a holistic impact</title>
  <meta name="description" content="Fresh Strategy — Modular innovation solutions, delivering a holistic impact." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />
  <style>
    /* ---------- Design tokens (derived from Figma) ---------- */
    :root {
      --color-ink: #3c1642;            /* primary text / brand */
      --color-bg: #ffffff;
      --color-mint: #b5f0e5;           /* accent underline / highlight blocks */
      --color-active: #ffffff;         /* nav active underline */

      /* Header gradient stops */
      --grad-1: rgba(178, 255, 158, 0.25);
      --grad-2: rgba(120, 238, 165, 0.25);
      --grad-3: rgba(29, 211, 176, 0.25);

      /* Typography */
      --font-sans: "Inter", system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;

      /* Fluid type (min ↔ max from Figma spec) */
      --fs-hero: clamp(2.25rem, 5.5vw + 0.5rem, 70px);
      --fs-sub:  clamp(1.125rem, 1.2vw + 0.75rem, 26px);
      --fs-nav:  clamp(1rem, 0.5vw + 0.9rem, 22px);
      --fs-brand: clamp(1.25rem, 0.5vw + 1.1rem, 26px);

      /* Layout */
      --container-inline: clamp(1.25rem, 6vw, 140px);
      --max-hero: 852px;
      --max-title: 726px;
    }

    /* ---------- Reset / base ---------- */
    *,
    *::before,
    *::after { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: var(--font-sans);
      color: var(--color-ink);
      background: var(--color-bg);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a { color: inherit; text-decoration: none; }

    ul { list-style: none; padding: 0; margin: 0; }

    img { display: block; max-width: 100%; height: auto; }

    /* Focus style — visible for keyboard users */
    :focus-visible {
      outline: 2px solid var(--color-ink);
      outline-offset: 4px;
      border-radius: 2px;
    }

    /* ---------- Header ---------- */
    .site-header {
      position: relative;
      isolation: isolate;
      padding-inline: var(--container-inline);
      background:
        linear-gradient(
          180deg,
          var(--grad-1) 0%,
          var(--grad-2) 50%,
          var(--grad-3) 100%
        );
      overflow: hidden;
    }

    /* Soft radial highlights to echo the Figma header art */
    .site-header::before,
    .site-header::after {
      content: "";
      position: absolute;
      pointer-events: none;
      z-index: -1;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
    }
    .site-header::before {
      width: 520px; height: 520px;
      top: -160px; right: -120px;
      background: radial-gradient(circle, rgba(29,211,176,0.55), transparent 60%);
    }
    .site-header::after {
      width: 600px; height: 600px;
      bottom: -240px; left: -120px;
      background: radial-gradient(circle, rgba(178,255,158,0.55), transparent 60%);
    }

    /* ---------- Top nav ---------- */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      padding-block: 40px 24px;
    }

    .brand {
      font-weight: 800;
      font-size: var(--fs-brand);
      letter-spacing: 0.02em;
      line-height: 1;
      white-space: nowrap;
    }

    .nav-list {
      display: flex;
      align-items: center;
      gap: clamp(1.25rem, 2.5vw, 2.5rem);
      font-size: var(--fs-nav);
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .nav-link {
      position: relative;
      display: inline-block;
      padding: 8px 2px;
    }

    .nav-link:hover {
      opacity: 0.75;
    }

    /* Active underline (white bar in Figma) */
    .nav-link[aria-current="page"]::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -4px;
      height: 4px;
      background: var(--color-active);
      border-radius: 2px;
    }

    /* Mobile menu toggle (hidden on desktop) */
    .nav-toggle {
      display: none;
      background: transparent;
      border: 0;
      padding: 8px;
      cursor: pointer;
      color: var(--color-ink);
    }

    .nav-toggle span,
    .nav-toggle span::before,
    .nav-toggle span::after {
      content: "";
      display: block;
      width: 28px;
      height: 3px;
      background: currentColor;
      border-radius: 2px;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .nav-toggle span { position: relative; }
    .nav-toggle span::before { position: absolute; top: -9px; }
    .nav-toggle span::after  { position: absolute; top:  9px; }

    .nav-toggle[aria-expanded="true"] span { background: transparent; }
    .nav-toggle[aria-expanded="true"] span::before { transform: translateY(9px) rotate(45deg); }
    .nav-toggle[aria-expanded="true"] span::after  { transform: translateY(-9px) rotate(-45deg); }

    /* ---------- Hero ---------- */
    .hero {
      max-width: 1100px;
      margin: 0 auto;
      text-align: center;
      padding-block: clamp(3rem, 8vw, 120px) clamp(4rem, 12vw, 200px);
    }

    .hero-title {
      font-weight: 900;
      font-size: var(--fs-hero);
      line-height: 1.05;
      letter-spacing: -0.01em;
      max-width: var(--max-title);
      margin: 0 auto 2rem;
    }

    .hero-subtitle {
      font-weight: 400;
      font-size: var(--fs-sub);
      line-height: 1.46;
      letter-spacing: 0.08em;
      max-width: var(--max-hero);
      margin: 0 auto;
    }

    /* ---------- Responsive ---------- */
    @media (max-width: 820px) {
      .nav-toggle { display: inline-flex; }
      .nav-list {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        flex-direction: column;
        align-items: flex-start;
        gap: 0;
        padding: 1rem var(--container-inline) 2rem;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        transform: translateY(-8px);
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
      }
      .nav-list.is-open {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
      }
      .nav-list li { width: 100%; }
      .nav-link {
        display: block;
        width: 100%;
        padding: 12px 0;
        border-bottom: 1px solid rgba(60, 22, 66, 0.12);
      }
      .nav-link[aria-current="page"]::after { display: none; }
      .nav-link[aria-current="page"] { color: var(--color-ink); font-weight: 800; }

      .nav { position: relative; padding-block: 24px; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <header class="site-header" role="banner">
    <nav class="nav" aria-label="Primary">
      <a href="#top" class="brand" aria-label="Fresh Strategy — home">Fresh Strategy</a>

      <button
        class="nav-toggle"
        type="button"
        aria-expanded="false"
        aria-controls="primary-nav"
        aria-label="Toggle navigation"
      >
        <span></span>
      </button>

      <ul class="nav-list" id="primary-nav">
        <li><a class="nav-link" href="#services" aria-current="page">Services</a></li>
        <li><a class="nav-link" href="#blog">Blog</a></li>
        <li><a class="nav-link" href="#about">About</a></li>
        <li><a class="nav-link" href="#contact">Contact us</a></li>
      </ul>
    </nav>

    <section class="hero" aria-labelledby="hero-title">
      <h1 id="hero-title" class="hero-title">
        Modular solutions, delivering a holistic impact
      </h1>
      <p class="hero-subtitle">
        Combining approaches with the right level of guidance to meet your innovation objectives.
      </p>
    </section>
  </header>

  <main id="top">
    <!-- Subsequent sections (Our approach, How we work, Our work in practice,
         Be inspired, Footer) will be added in follow-up steps. -->
  </main>

  <script>
    (function () {
      const toggle = document.querySelector('.nav-toggle');
      const list = document.getElementById('primary-nav');
      if (!toggle || !list) return;

      toggle.addEventListener('click', function () {
        const open = list.classList.toggle('is-open');
        toggle.setAttribute('aria-expanded', String(open));
      });

      // Close menu on link click (mobile)
      list.addEventListener('click', function (e) {
        if (e.target.matches('.nav-link')) {
          list.classList.remove('is-open');
          toggle.setAttribute('aria-expanded', 'false');
        }
      });
    })();
  </script>
</body>
</html>
